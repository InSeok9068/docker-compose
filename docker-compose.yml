services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./app/caddy:/data
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - todo-pocketbase
      - stylemate-pocketbase
      - kjca-pocketpages
      - sample-pocketpages
      - squash-helper
    networks:
      - public
      - private
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  todo-pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: todo-pocketbase
    restart: unless-stopped
    environment:
      PB_HOST: 0.0.0.0
      PB_PORT: 8090
      # 서버 환경변수(또는 .env)에서 주입. 미설정이면 compose가 에러로 중단함.
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY}
      # 초기 1회만 사용 후 제거 권장
      #PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      #PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
    # ✅ 외부에 포트 공개하지 않음 (Caddy가 내부로 프록시)
    expose:
      - "8090"
    volumes:
      - /path/to/todo/data:/pb_data
      - /path/to/todo/public:/pb_public
      - /path/to/todo/hooks:/pb_hooks
      # ✅ (옵션) 마이그레이션 파일 read-only 마운트
      # - /path/to/todo/migrations:/pb_migrations:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8090/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - private
      - egress
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  stylemate-pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: stylemate-pocketbase
    restart: unless-stopped
    environment:
      PB_HOST: 0.0.0.0
      PB_PORT: 8090
      # 서버 환경변수(또는 .env)에서 주입. 미설정이면 compose가 에러로 중단함.
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY}
      # 초기 1회만 사용 후 제거 권장
      # PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      # PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
    # ✅ 외부에 포트 공개하지 않음 (Caddy가 내부로 프록시)
    expose:
      - "8090"
    volumes:
      - /path/to/stylemate/data:/pb_data
      - /path/to/stylemate/public:/pb_public
      - /path/to/stylemate/hooks:/pb_hooks
      # ✅ (옵션) 마이그레이션 파일 read-only 마운트
      # - /path/to/stylemate/migrations:/pb_migrations:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8090/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - private
      - egress
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  kjca-pocketpages:
    image: ghcr.io/inseok9068/kjca:release
    container_name: kjca-pocketpages
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY}
      # 초기 1회만 사용 후 제거 권장
      # PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      # PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
    expose:
      - "8090"
    volumes:
      - /path/to/kjca/data:/app/pb_data
      - /path/to/kjca/public:/app/pb_public
      - /path/to/kjca/hooks:/app/pb_hooks
      # ✅ (옵션) 마이그레이션 파일 read-only 마운트
      # - /path/to/kjca/migrations:/app/pb_migrations:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8090/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
