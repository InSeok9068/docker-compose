x-common-logging: &common-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

x-pocket-app: &pocket-app
  restart: unless-stopped
  stop_grace_period: 30s
  expose:
    - "8090"
  networks:
    - private
    - egress
  logging: *common-logging

services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./app/caddy:/data
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - todo-pocketbase
      - stylemate-pocketbase
      - kjca-pocketpages
      - sample-pocketpages
      - booklog-pocketpages
      - photofolio-pocketpages
      - homeping-pocketpages
      - launchboard-pocketpages
      - squash-helper
    networks:
      - public
      - private
    logging: *common-logging

  todo-pocketbase:
    <<: *pocket-app
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: todo-pocketbase
    environment:
      PB_HOST: 0.0.0.0
      PB_PORT: 8090
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY}
      # 초기 1회만 사용 후 제거 권장
      # PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      # PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
    volumes:
      - /path/to/todo/data:/pb_data
      - /path/to/todo/public:/pb_public
      - /path/to/todo/hooks:/pb_hooks
      # - /path/to/todo/migrations:/pb_migrations:ro

  stylemate-pocketbase:
    <<: *pocket-app
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: stylemate-pocketbase
    environment:
      PB_HOST: 0.0.0.0
      PB_PORT: 8090
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY}
      # 초기 1회만 사용 후 제거 권장
      # PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      # PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
    volumes:
      - /path/to/stylemate/data:/pb_data
      - /path/to/stylemate/public:/pb_public
      - /path/to/stylemate/hooks:/pb_hooks
      # - /path/to/stylemate/migrations:/pb_migrations:ro

  kjca-pocketpages:
    <<: *pocket-app
    image: ghcr.io/inseok9068/kjca:release
    container_name: kjca-pocketpages
    environment:
      APP_ENV: production
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY}
      # 초기 1회만 사용 후 제거 권장
      # PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      # PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
    volumes:
      - /path/to/kjca/data:/app/apps/kjca/pb_data
      - /path/to/kjca/public:/app/apps/kjca/pb_public
      - /path/to/kjca/hooks:/app/apps/kjca/pb_hooks
      # - /path/to/kjca/migrations:/app/apps/kjca/pb_migrations:ro

  sample-pocketpages:
    <<: *pocket-app
    image: ghcr.io/inseok9068/sample:release
    container_name: sample-pocketpages
    environment:
      APP_ENV: production
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY}
      # 초기 1회만 사용 후 제거 권장
      # PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      # PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
    volumes:
      - /path/to/sample/data:/app/apps/sample/pb_data
      - /path/to/sample/public:/app/apps/sample/pb_public
      - /path/to/sample/hooks:/app/apps/sample/pb_hooks
      # - /path/to/sample/migrations:/app/apps/sample/pb_migrations:ro

  booklog-pocketpages:
    <<: *pocket-app
    image: ghcr.io/inseok9068/booklog:release
    container_name: booklog-pocketpages
    environment:
      APP_ENV: production
      # GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY}
      DATA4LIBRARY_APIKEY: ${DATA4LIBRARY_APIKEY:?set DATA4LIBRARY_APIKEY}
      ONESIGNAL_APPID: ${ONESIGNAL_APPID:?set ONESIGNAL_APPID}
      ONESIGNAL_APIKEY: ${ONESIGNAL_APIKEY:?set ONESIGNAL_APIKEY}
      # 초기 1회만 사용 후 제거 권장
      # PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      # PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
    volumes:
      - /path/to/booklog/data:/app/apps/booklog/pb_data
      - /path/to/booklog/public:/app/apps/booklog/pb_public
      - /path/to/booklog/hooks:/app/apps/booklog/pb_hooks
      # - /path/to/booklog/migrations:/app/apps/booklog/pb_migrations:ro

  photofolio-pocketpages:
    <<: *pocket-app
    image: ghcr.io/inseok9068/photofolio:release
    container_name: photofolio-pocketpages
    environment:
      APP_ENV: production
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY}
      FRED_APIKEY: ${FRED_APIKEY:?set FRED_APIKEY}
      # 초기 1회만 사용 후 제거 권장
      # PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      # PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
    volumes:
      - /path/to/photofolio/data:/app/apps/photofolio/pb_data
      - /path/to/photofolio/public:/app/apps/photofolio/pb_public
      - /path/to/photofolio/hooks:/app/apps/photofolio/pb_hooks
      # - /path/to/photofolio/migrations:/app/apps/photofolio/pb_migrations:ro

  homeping-pocketpages:
    <<: *pocket-app
    image: ghcr.io/inseok9068/homeping:release
    container_name: homeping-pocketpages
    environment:
      APP_ENV: production
      DATAGOKR_APIKEY: ${DATAGOKR_APIKEY:?set DATAGOKR_APIKEY}
      HOMEPING_ONESIGNAL_APIKEY: ${HOMEPING_ONESIGNAL_APIKEY:?set HOMEPING_ONESIGNAL_APIKEY}
      HOMEPING_ONESIGNAL_APPID: ${HOMEPING_ONESIGNAL_APPID:?set HOMEPING_ONESIGNAL_APPID}
      # 초기 1회만 사용 후 제거 권장
      # PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      # PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
    volumes:
      - /path/to/homeping/data:/app/apps/homeping/pb_data
      - /path/to/homeping/public:/app/apps/homeping/pb_public
      - /path/to/homeping/hooks:/app/apps/homeping/pb_hooks
      # - /path/to/homeping/migrations:/app/apps/homeping/pb_migrations:ro

  launchboard-pocketpages:
    <<: *pocket-app
    image: ghcr.io/inseok9068/launchboard:release
    container_name: launchboard-pocketpages
    environment:
      APP_ENV: production
      # 초기 1회만 사용 후 제거 권장
      # PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      # PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
    volumes:
      - /path/to/launchboard/data:/app/apps/launchboard/pb_data
      - /path/to/launchboard/public:/app/apps/launchboard/pb_public
      - /path/to/launchboard/hooks:/app/apps/launchboard/pb_hooks
      # - /path/to/launchboard/migrations:/app/apps/launchboard/pb_migrations:ro

  squash-helper:
    container_name: squash-helper
    image: ghcr.io/inseok9068/squash-helper:release
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - private
      - egress
    logging: *common-logging

networks:
  public:
  private:
    internal: true
  # Outbound(egress) is allowed on this network. Attach services that must call external APIs.
  egress:
