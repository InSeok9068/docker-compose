    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8090/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - private
      - egress
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  squash-helper:
    container_name: squash-helper
    image: ghcr.io/inseok9068/squash-helper:release
    restart: unless-stopped
    # ✅ 외부 포트 공개하지 않음 (Caddy가 내부로 프록시)
    expose:
      - "8080"
    networks:
      - private
      - egress
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  public:
  private:
    internal: true
  # Outbound(egress) is allowed on this network. Attach services that must call external APIs.
  egress:
